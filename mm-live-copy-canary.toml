# mm-live-copy-canary.toml — REAL-MONEY smart-money COPY-TRADING canary.
#
# Runs ONLY the CopyStrategy (arb neutered, MM disabled): it ranks the top
# leaderboard traders by EdgePerBet (entries that beat outcomes), watches their
# FRESH buys, and — when our entry price is within `max_drift` of their fill —
# places a tiny taker BUY, exiting on follow (they sell), stop-loss, or
# resolution (redeem via the M6 relayer). This is the platform's FIRST
# DIRECTIONAL strategy.
#
# WHAT THIS PROVES (the canary's job):
#   * the live copy path runs clean (whitelist refresh, fresh-signal detection,
#     freshness gate, taker entry, follow/stop/redeem exits),
#   * the out-of-sample-validated edge (EdgePerBet + freshness ≤0.15 + ~30-min
#     reaction; backtest: 68.7% hit, +25.6%/bet, Sharpe 0.30 @ n=150) shows up
#     on live fills — watch realized P&L over a week+ of resolved copies.
#
# BLAST RADIUS (DIRECTIONAL — read this):
#   * A copy is a one-sided bet: if the market resolves AGAINST us, the whole
#     position is lost. The controls are HARD and small:
#       - DYNAMIC: max_gross = gross_pct (0.5) × live account equity. Each copy is
#         a FIXED $5; the NUMBER of concurrent copies scales with the budget
#         (min(max_gross / $5, 20-trade hard cap)), so risk stays ≤ 50% of the
#         account while never missing a signal for lack of a slot once funded.
#       - stop_loss_pct (0.25) cuts a losing copy at -25% before resolution.
#       - inventory_stop_loss / daily_loss / live.session_loss latch a halt.
#   * UNIVERSE: the synced universe IS this strategy's OWN whitelist's active
#     markets — main ranks the EdgePerBet whitelist once and syncs the markets
#     those exact traders hold (their OPEN positions), so the tradeable set
#     overlaps the copy signals by construction (≈1:1). And it is NOT a hard
#     ceiling: a fresh buy in a market the snapshot didn't cover is synced
#     ON-DEMAND at signal time (one CLOB /markets fetch + venue register, then
#     traded immediately) — entry latency is NOT bounded by the snapshot cadence,
#     which matters because reaction speed is part of the copy edge. On a
#     Data-API failure the seed falls back to the liquidity universe.
#
# RUN (with the TUI so you can watch the copy line; `l` releases live, `k` kill,
# `q` quit). Keys load from .env (PM_PRIVATE_KEY / PM_PROXY_ADDRESS /
# PM_DEPOSIT_WALLET + RELAYER_API_KEY / RELAYER_API_KEY_ADDRESS):
#
#   echo "I understand this trades real money" | cargo run --release --bin arb -- \
#     --live --config mm-live-copy-canary.toml --db /tmp/copy-canary.sqlite

[capital]
bankroll_usd   = 30.0   # startup carve ceiling — a FALLBACK now: dynamic gross_pct sizing overrides at runtime
per_market_usd = 10.0   # arb per-market sizing — MOOT (arb neutered below), but must be ≤ bankroll to pass validation (default 1000 > 30 would fail)

[strategies.copy]
enabled     = true
live        = true
capital_usd = 25.0    # FALLBACK carve (dynamic gross_pct overrides at runtime); MUST be <= bankroll

[copy]
# DYNAMIC SIZING: with gross_pct > 0 the caps SCALE with live account EQUITY
# (spendable CLOB collateral + marked value of open copies), refreshed each cycle
# (60 s TTL). Each cycle: max_gross = gross_pct × equity; per-copy notional =
# max_gross / max_concurrent_positions; the capital carve = max_gross. The *_usd
# knobs below are only the FALLBACK — used at startup before the first balance
# read, or if the balance endpoint is unreachable (never widens risk).
gross_pct                = 0.5   # ≤ 50% of the account at risk; scales up as you win/deposit
per_position_usd         = 5.0   # FIXED per-copy notional (≥5 shares clears the venue min) — does NOT scale
# CONCURRENCY scales with the budget instead of the per-copy size: each cycle
# max_concurrent = min(max_gross / per_position_usd, this hard cap). So a funded
# account simply opens MORE $5 copies (never missing a signal for lack of a slot),
# up to 20 open at once; a small account is naturally fewer (e.g. $17 gross / $5 ⇒
# 3). In static mode (gross_pct=0) this is just the fixed cap.
max_concurrent_positions = 20
max_gross_usd            = 15.0  # FALLBACK gross ceiling — used only if gross_pct=0 or equity is unknown
stop_loss_pct            = 0.25  # cut a losing copy at -25%
max_drift                = 0.15  # FRESHNESS: skip if our entry is >15% off the trader's fill
reaction_window_secs    = 1800   # only copy a buy seen within 30 min
min_bets                = 5     # min resolved bets to rank a trader (EdgePerBet)
top_n                   = 100     # whitelist size
whitelist_refresh_secs  = 21600  # re-rank the skilled set every 6h
signal_poll_secs        = 10    # poll whitelisted traders' fresh buys every 30s (faster = less reaction lag; on-demand sync means a hit trades immediately)
follow_exit             = true   # sell when the copied trader sells

# Disable the MM — only the copy strategy trades this canary.
[strategies.mm]
enabled = false

# Neuter arb so nothing else trades.
[edges]
min_edge_class12_bps = 9000
min_edge_class3_bps  = 9000
max_edge_bps         = 9500

# Inventory / loss latches (copy books into InventoryRisk; keep small for a canary).
[inventory]
max_inventory_usd       = 20.0
max_gross_inventory_usd = 25.0
inventory_stop_loss_usd = 8.0
daily_loss_usd          = 8.0
vol_pull_ticks          = 6
vol_window_ms           = 2500

[live]
session_loss_usd = 8.0
basket_cap_usd   = 1.0   # moot (arb neutered) but must be > 0
# M6 relayer: needed to REDEEM resolved winners. Auth validated via --relayer-check.
relayer_enabled  = true
relayer_staging  = false

# FALLBACK universe — used ONLY if the copy whitelist-driven universe can't be
# built (Data-API failure). `candidate_pool` also caps how many of the whitelist's
# active condition-ids we sync; `auto_restart_secs` re-snapshots both.
[universe]
max_markets             = 10000
prioritize_by_liquidity = true
candidate_pool          = 12000
# OFF for the copy canary: a periodic re-exec would (until the position-reload
# lands) orphan open copies and re-deploy on top. Copy doesn't need periodic
# universe re-sync anyway — the whitelist refreshes on its own timer and unsynced
# signals are on-demand synced. One long-lived process manages all positions.
auto_restart_secs       = 0

[segments]
liquid_stable_min_volume    = 50000.0
liquid_stable_min_liquidity = 10000.0
liquid_min_volume           = 2000.0
liquid_min_liquidity        = 1000.0

# UNIVERSE = THE COPY WHITELIST'S ACTIVE MARKETS (automatic when copy is on).
# Because [strategies.copy] is enabled, the synced universe is built from the
# strategy's OWN EdgePerBet whitelist's OPEN positions (their active markets) —
# the exact traders it copies — so a fresh-buy signal lands in a synced,
# tradeable market (≈1:1 coverage) instead of a generic liquidity scan. main
# ranks the whitelist ONCE (shared with the strategy so the rank isn't run twice)
# and unions its open-position condition-ids, capped at [universe].candidate_pool.
# Re-built every auto_restart_secs; on any Data-API failure it falls back to the
# [universe] liquidity set.
#
# Confluence (the SEPARATE top-PnL universe used by the MM) is therefore SKIPPED
# while the copy strategy runs — leave it off.
[confluence]
enabled = false
