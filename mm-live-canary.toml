# mm-live-canary.toml — REAL-MONEY maker canary (rung 2).
#
# Runs the MM live (NOT shadow): real postOnly GTC orders that REST on the book,
# get replaced/canceled each refresh, and fill via the live user-WS. Arb is
# neutered (edge floors set absurdly high) so the ONLY thing trading is the MM
# maker path — this isolates the test.
#
# Blast radius (worst case, all caps are HARD):
#   * postOnly never crosses → we only ever pay the spread, never lift the book.
#   * max_quote_usd = $5/side, max_markets = 2 → ≤ 4 resting orders, ≤ $20 notional
#     RESTING (not risk — risk is only what FILLS).
#   * inventory caps bound FILLED exposure: ≤ $6 net/market, ≤ $12 gross.
#   * inventory_stop_loss_usd = $5 and live.session_loss_usd = $6 latch a halt.
#   → realistic worst-case loss a few dollars (a one-sided fill that gaps before
#     we offload), expected ≈ $0 (MM captures spread).
#
#   export PM_PRIVATE_KEY=…  PM_PROXY_ADDRESS=…  PM_DEPOSIT_WALLET=…
#   echo "I understand this trades real money" | cargo run --release --bin arb -- \
#     --live --headless --config mm-live-canary.toml --duration-secs 120 \
#     --db /tmp/mm-canary.sqlite

[strategies.mm]
enabled          = true
live             = true
capital_usd      = 10.0
max_markets      = 100
spread_bps       = 80      # rest AT the touch so a real fill is likely (exercises the WS fill path)
quote_refresh_ms = 2500    # replace every 2.5s → exercises cancel/replace
max_quote_usd    = 5.0     # $5 buys ≥ 5 shares at ANY price ≤ $1 (5×$1=$5) → clears the venue's 5-share minimum on every market. $1 gave ~1-share orders that the venue rejected ("Size (1) lower than the minimum: 5"). NOTE: with ~$18 this funds only ~3-4 resting orders; add funding for more breadth.
live_fills_source = "ws"   # exercise the low-latency user-WS fills feed

[inventory]
max_inventory_usd       = 6.0
max_gross_inventory_usd = 12.0
inventory_stop_loss_usd = 5.0
daily_loss_usd          = 6.0
vol_pull_ticks          = 6
vol_window_ms           = 2500

[live]
session_loss_usd = 6.0
basket_cap_usd   = 1.0     # moot (arb neutered) but must be > 0

# Neuter arb for an isolated maker test: only an impossible ≥90% risk-free edge
# would ever dispatch, so arb never trades real money during this canary.
[edges]
min_edge_class12_bps = 9000
min_edge_class3_bps  = 9000
max_edge_bps         = 9500

[segments]
liquid_stable_min_volume    = 50000.0
liquid_stable_min_liquidity = 10000.0
liquid_min_volume           = 2000.0
liquid_min_liquidity        = 1000.0
mm_segments         = ["LiquidStable", "Liquid"]
mm_exclude_fee_free = true

[universe]
max_markets             = 100   # synced/subscribed markets → ~200 books (×2 tokens). THIS is what `books` counts.
prioritize_by_liquidity = true
candidate_pool          = 150    # rank a bigger pool by liquidity, keep the top `max_markets`
# Periodic universe REFRESH ("keep diversifying"): re-exec every 30 min to pick
# up new markets. A RELEASED live session resumes automatically across the
# re-sync (it carries the release via PM_RESUME_LIVE — no re-hold/re-confirm); a
# still-held session re-holds. 0 = off; must be 0 or >= 60.
auto_restart_secs       = 1800

# [confluence] — "follow the smart money" (LEVEL-1 CONFLUENCE).
#
# When enabled, the universe is NOT the liquidity-ranked Gamma keyset above —
# instead it is built from the OPEN positions of the top leaderboard traders
# (public Data API). For each such market the MM quotes ONLY the FAVORED outcome
# (the side most of those traders hold), so we lean DIRECTIONALLY toward the
# smart money instead of quoting both sides. The [segments] liquidity filter and
# [universe] caps STILL apply on top, so we only follow them into markets liquid
# enough to make a market in; illiquid longshots are dropped. Re-runs each
# auto_restart so the smart-money snapshot stays fresh.
#
# Caps/guards are UNCHANGED — inventory caps + session loss still bound the
# blast radius exactly as documented at the top of this file.
[confluence]
enabled       = true     # set false to fall back to the liquidity universe above
top_traders   = 10       # follow the top 10 traders WHO HOLD open positions
scan_limit    = 50       # scan this deep down the board to find 10 with open positions (top PnL winners often hold nothing)
order_by      = "pnl"    # "pnl" = top profit, "vol" = most active
time_period   = "month"  # day | week | month | all  → "top profit THIS MONTH"
size_threshold = 1.0     # ignore a trader's positions smaller than this many shares
