# mm-paper.toml — PAPER market-making demo (no real money).
#
# Runs the new market-maker strategy alongside arbitrage, with SIMULATED fills
# against the live book. Nothing here can place a real order: `live = false`
# everywhere and the binary is not started with `--live`. Only the sections
# below are overridden; every other config value uses its built-in default
# (same mechanism as canary.toml).
#
#   cargo build --release --bin arb
#   ./target/release/arb --config mm-paper.toml --max-markets 60 --db /tmp/mm-paper.sqlite
#
# Stop with `q` (TUI), `touch kill.switch`, or `kill -USR1 <pid>`.

# ---------------------------------------------------------------------------
# Arbitrage plausibility ceiling. The default (5000 bps = 50%) only catches
# absurd false arbs; but thin multi-outcome markets (e.g. "OpenAI market cap
# $500–750B", "GPT-6 released by …") produce 5–11% FALSE arbs from stale/crossed
# books that slip under 50% — arb then dispatched them and lost money in paper.
# Genuine risk-free arbs sit just above the 30/100 bps floors (well under ~2%),
# so a 400 bps (4%) ceiling suppresses the false ones with wide headroom for real
# ones. (Consider tightening your LIVE arb config the same way.)
# ---------------------------------------------------------------------------
[edges]
max_edge_bps = 400

# ---------------------------------------------------------------------------
# Market maker (paper)
# ---------------------------------------------------------------------------
[strategies.mm]
enabled          = true     # turn the market-maker ON (default is off)
live             = false    # PAPER: fills come from the simulator, never the venue
policy           = "reward_farm"  # REWARD FARMING (Spec 1): tight two-sided sticky quotes on reward-eligible markets, ranked by reward$/competition; confluence forced off. "spread_capture" = the legacy path.
capital_usd      = 2000.0   # PAPER bankroll, bumped so the budget funds several reward markets (per-market cost ~= 2*min_size*mid ~= $100 at min_size 100). Lower it to fund fewer; raise to fund more.
max_markets      = 60       # quote at most this many DISTINCT (busiest eligible) markets
max_per_event    = 2        # ...but at most 2 from any one event/component (NegRisk events
                            # collapse to one component), so a big multi-outcome event can't
                            # crowd out the rest. 0 = no per-event cap.
spread_bps       = 200      # total quoted spread: 200 bps = 0.02 → bid 0.49 / ask 0.51 at a 0.50 mid
quote_refresh_ms = 1500     # re-quote cadence
max_quote_usd    = 5.0      # max notional per single quote (one side)
inventory_skew_bps = 150    # lean quotes against inventory (long → quote lower to offload)
rebate_bps       = 0        # maker-rebate ESTIMATE (bps of filled notional). 0 = none assumed;
                            # set your real CLOB maker-rewards rate to see accrual in paper.
paper_taker_fill_pct = 30   # PAPER demo aid: simulate takers lifting 30% of each resting quote
                            # per cycle so you SEE fills → inventory → skew → P&L. 0 = the
                            # conservative adverse-only sim (idle in a calm market). Optimistic
                            # (no queue modelling); ignored on the live path.
# live_fills_source only matters when live = true ("ws" = low-latency user feed, "rest" = poll).

# ---------------------------------------------------------------------------
# Reward farming (Spec 1) — only consulted when [strategies.mm] policy = "reward_farm".
# The MM quotes BOTH sides as tight to the size-cutoff-adjusted mid as post-only
# allows (within each market's max_incentive_spread), STICKY (re-quote only when a
# side drifts out of the reward band, so cancels don't reset the time-weighted
# score), with delta-neutral SIZE skew (prices stay tight). The dashboard "rew"
# line shows the local estimate of daily reward $, Q_min, in-band, and balance.
# ---------------------------------------------------------------------------
[reward_farm]
size_skew_max_ratio = 2.0      # max bid:ask SIZE lean against inventory (1.0 = never skew)
requote_band_ticks  = 1        # re-place a side only when it drifts > this many ticks from target (anti-flicker)
sample_interval_ms  = 60000    # estimator sampling cadence, mirroring Polymarket's ~1/min book sampling
min_markets         = 1        # advisory floor; warns (doesn't synthesize) if fewer reward-eligible markets fund

# ---------------------------------------------------------------------------
# Inventory risk (caps the MM takes on; halts latch and pull/cancel quotes)
# ---------------------------------------------------------------------------
[inventory]
max_inventory_usd       = 50.0    # per-market signed inventory cap (quotes beyond this are rejected)
max_gross_inventory_usd = 150.0   # total gross inventory across all markets
inventory_stop_loss_usd = 25.0    # unrealized loss that latches a stop (cancels quotes)
daily_loss_usd          = 50.0    # total (realized+unrealized) daily floor
vol_pull_ticks          = 5       # a mid move ≥ this many ticks within the window pulls quotes
vol_window_ms           = 2000    # volatility-hint window

# ---------------------------------------------------------------------------
# Segmentation — which markets the MM is allowed to quote.
# Arb always runs on ALL markets; the MM only quotes the segments listed below.
# NOTE: these thresholds are LOWERED for a small paper demo so markets actually
# qualify. For production, raise them (defaults: LiquidStable vol>=100k/liq>=50k,
# Liquid vol>=10k/liq>=5k) so the MM only touches genuinely deep books.
# ---------------------------------------------------------------------------
[segments]
liquid_stable_min_volume    = 50000.0
liquid_stable_min_liquidity = 10000.0
liquid_min_volume           = 2000.0
liquid_min_liquidity        = 1000.0
mm_segments         = ["LiquidStable", "Liquid"]  # never quote Illiquid markets
mm_exclude_fee_free = true                         # skip 0-fee markets (rebate MM earns nothing there)

# ---------------------------------------------------------------------------
# Universe — keep the most-liquid markets when capped (so the MM has deep books
# to quote). Opt-in; default sync order is arbitrary (Gamma keyset order).
# ---------------------------------------------------------------------------
[universe]
max_markets             = 300    # synced universe size — broad coverage. Arb runs on all 300;
                                 # the MM (max_markets 60, ≤2/event) spreads across the many
                                 # events these 300 markets span.
prioritize_by_liquidity = true
candidate_pool          = 400    # rank up to this many candidates, keep the top max_markets.
                                 # Each candidate is a rate-limited CLOB fetch (~5/s), so this
                                 # is the startup cost: 400 ≈ ~80-90s sync. Raise both for even
                                 # broader coverage (e.g. 1000/1200 ≈ ~4 min sync).
auto_restart_secs       = 1800   # every 30 min, re-exec for a FRESH universe (new markets appear
                                 # over time); positions/P&L persist via the store. Set well above
                                 # the sync time so the ~90s re-sync is a small fraction. 0 = off.
