# Minimal canary config — tuned for a ~$5.88 wallet (2026-06-13).
#
# Same intent as canary.toml (sizing-only deviation; all safety guards intact)
# but sized so a single basket fits a tiny balance: baskets are capped at ~$5
# of basis, leaving margin under $5.88 for venue fees/rounding. The 5-share
# venue minimum still applies per leg; the pure-buy arbs the bot finds are on
# cheap (cents-per-share) legs, so a 5-share leg costs cents and a whole basket
# fits well under $5.
#
# After the FIRST fill the wallet is mostly spent — stop the session (k or q)
# and reconcile. Further dispatches would be rejected by the venue for
# insufficient balance (harmless: they error and, after 5, latch a halt).

[capital]
per_market_usd = 5.0      # size baskets to <= ~$5 basis (fits $5.88 with margin)

[edges]
min_profit_usd = 0.01     # 30/100 bps NET edge floors (defaults) stay the real gate

[universe]
max_markets = 100

[live]
basket_cap_usd   = 5.2    # hard reject anything over $5.20 (wallet is $5.88)
session_loss_usd = 3.0    # latched halt if bid-marked P&L drops to -$3
